worker_processes 1;

events {
    worker_connections 1024;
}

http {
    map $http_origin $cors_origin {
        default "";
        "https://app.acme.com" $http_origin;
        "https://admin.acme.com" $http_origin;
        "https://acme.com" $http_origin;
        "https://www.acme.com" $http_origin;
        "https://checkout.acme.com" $http_origin;
        "https://partner.example.com" $http_origin;
    }

    upstream orders_api {
        server orders-api:3001;
    }

    upstream status_api {
        server status-api:3010;
    }

    server {
        listen 8080;
        server_name cors-audit.local;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Vary "Origin" always;

        include conf.d/*.conf;
    }
}
